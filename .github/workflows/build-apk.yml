name: Build NetScanner APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Android SDK (pre-installed on ubuntu-latest) ───────────
      - name: Configure Android SDK
        run: |
          ANDROID_SDK=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$ANDROID_SDK"     >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK" >> $GITHUB_ENV
          echo "$ANDROID_SDK/platform-tools"   >> $GITHUB_PATH
          yes | $ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager --licenses || true
          $ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" || true

      # ── Install Gradle 8.4 & generate wrapper jar ──────────────
      - name: Install Gradle and generate wrapper
        run: |
          # Download and install Gradle 8.4
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip \
               -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle-dist
          export GRADLE_BIN=/opt/gradle-dist/gradle-8.4/bin
          export PATH=$GRADLE_BIN:$PATH

          # Generate proper gradle-wrapper.jar using installed Gradle
          gradle wrapper --gradle-version 8.4 --distribution-type bin

          echo "Wrapper jar: $(ls -lh gradle/wrapper/gradle-wrapper.jar)"
          echo "Gradle version: $(gradle --version | head -1)"

      # ── Build APK ──────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NetScanner-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Show result
        run: |
          echo "Build complete!"
          find . -name "*.apk" 2>/dev/null
          ls -lh app/build/outputs/apk/debug/ 2>/dev/null || true
