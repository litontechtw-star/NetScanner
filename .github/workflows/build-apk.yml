name: Build NetScanner APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # 允許手動觸發

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 取得程式碼 ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. 設定 JDK 17 ──────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. 設定 Android SDK ──────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. 賦予 gradlew 執行權限 ─────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # ── 5. 快取 Gradle ────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 6. 執行 Lint 檢查 ─────────────────────────────────────────────────
      - name: Run Lint
        run: ./gradlew lintDebug
        continue-on-error: true

      # ── 7. 編譯 Debug APK ────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── 8. 上傳 APK 作為 Artifact ────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NetScanner-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 9. 顯示 APK 資訊 ─────────────────────────────────────────────────
      - name: Display APK info
        run: |
          echo "✅ Build successful!"
          ls -la app/build/outputs/apk/debug/
          echo ""
          echo "📱 APK is ready for download in the Actions artifacts section."

  # ── Release build (僅在 tag 時觸發) ──────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: NetScanner-Release-APK
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release-unsigned.apk
          name: NetScanner Pro ${{ github.ref_name }}
          body: |
            ## NetScanner Pro ${{ github.ref_name }}

            ### 功能
            - 📡 網路測速（下載 / 上傳 / 延遲 / 抖動）
            - 📶 WiFi 網路掃描（SSID / 頻率 / 訊號強度 / 加密類型）
            - 📊 即時訊號品質監控與歷史圖表

            ### 安裝
            1. 下載 APK 檔案
            2. 在 Android 設定中允許「安裝未知來源」
            3. 開啟 APK 進行安裝
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
